<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}CalcParser{% endblock %}</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body data-page="{{ active }}">

<nav class="cp-navbar py-3">
  <div class="container d-flex align-items-center justify-content-between flex-wrap gap-3">
    <a href="{{ url_for('home') }}" class="cp-brand"><span class="dot"></span>CalcParser</a>
    <div class="page-nav">
      <a href="{{ url_for('tokenizer_page') }}" class="page-nav-link mod1 {{ 'active' if active == 'tokenizer' }}"><span class="num">01</span>Tokenizer</a>
      <a href="{{ url_for('regex_page') }}" class="page-nav-link mod2 {{ 'active' if active == 'regex' }}"><span class="num">02</span>Regex</a>
      <a href="{{ url_for('parser_page') }}" class="page-nav-link mod3 {{ 'active' if active == 'parser' }}"><span class="num">03</span>Parser</a>
      <a href="{{ url_for('cnf_page') }}" class="page-nav-link mod4 {{ 'active' if active == 'cnf' }}"><span class="num">04</span>CNF</a>
    </div>
  </div>
</nav>

{% block content %}{% endblock %}

<footer class="cp-footer">
  <div class="container d-flex flex-wrap justify-content-between gap-2">
    <span>CalcParser - Capstone Project Teori Bahasa dan Otomata</span>
    <span>Dibangun dengan Flask, vanilla JS, dan SVG</span>
  </div>
</footer>

<script src="{{ url_for('static', filename='script.js') }}"></script>
{% block extra_script %}{% endblock %}
</body>
</html>
